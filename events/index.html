<body data-events-mode="listing">
  <header class="site-header" id="site-header"></header>

  <main class="events-main">
    <section class="events-listing">
      <div class="container">
        <div class="events-section">
          <h1 class="events-section-title">Upcoming events</h1>
          <div id="upcoming-events" class="events-grid" aria-live="polite"></div>
          <p id="upcoming-empty" class="events-empty" hidden>No upcoming events right now. Follow us on Instagram for announcements, or reach out to plan a session.</p>
        </div>

        <div id="past-events-wrap" class="events-past-wrap" hidden>
          <button type="button" id="past-events-toggle" class="events-past-toggle" aria-expanded="false" aria-controls="past-events-panel">
            View past events
          </button>
          <div id="past-events-panel" class="events-past-panel" hidden>
            <h2 class="events-section-title">Past events</h2>
            <div id="past-events" class="events-grid"></div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <div class="footer-brand">
        <picture>
          <source srcset="/logo.webp" type="image/webp">
          <img src="/logo.png" alt="" class="footer-logo" width="40" height="42" loading="lazy" decoding="async" draggable="false">
        </picture>
        <span>Lucky Cat Mahjong</span>
      </div>
      <p class="footer-tagline">Hong Kong Mahjong in NYC</p>
      <p class="footer-copy">&copy; <span id="year"></span> Lucky Cat Mahjong</p>
    </div>
  </footer>

  <script src="/js/nav.js" defer></script>
  <script src="/js/events-lib.js" defer></script>
  <script src="/js/events.js" defer></script>
  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
